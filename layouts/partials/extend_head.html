{{- /* 内联自定义CSS */ -}}
<style>
  /* 调整页面宽度 */
  .main {
    max-width: 1400px;
  }
  
  /* 文章内容区域布局 */
  .post-single {
    position: relative;
  }
  
  /* 文章头部样式 */
  .post-header {
    width: 100%;
    margin-bottom: 30px;
  }
  
  /* 内容区域 - 包含目录和正文 */
  .post-content-area {
    display: flex;
    flex-direction: row;
    gap: 30px;
    align-items: flex-start;
  }
  
  /* 目录样式调整 */
  .toc {
    position: sticky;
    top: 20px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    width: 250px;
    flex-shrink: 0;
  }
  
  /* 确保文章内容区域有足够宽度 */
  .post-content {
    flex: 1;
    min-width: 0;
    max-width: 1000px;
    overflow-x: auto;
  }
  
  /* 处理代码和公式的溢出 */
  .post-content pre, 
  .post-content code, 
  .post-content math {
    overflow-x: auto;
  }
  
  /* 响应式调整 */
  @media (max-width: 1024px) {
    .post-content-area {
      flex-direction: column;
    }
    
    .toc {
      position: relative;
      top: 0;
      max-height: none;
      width: 100%;
      margin-bottom: 20px;
    }
    
    .post-content {
      max-width: none;
    }
  }
</style>

{{- /* MathJax support for LaTeX formulas */ -}}
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
