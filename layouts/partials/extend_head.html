{{- /* 内联自定义CSS */ -}}
<style>
  /* 调整页面宽度 */
  .main {
    max-width: 1400px;
  }
  
  /* 确保文章内容区域有足够宽度 */
  .post-content {
    max-width: 1200pt;
    overflow-x: auto;
  }
  
  /* 处理代码和公式的溢出 */
  .post-content pre, 
  .post-content code, 
  .post-content math {
    overflow-x: auto;
  }
  
  /* 目录样式调整 */
  .toc {
    position: sticky;
    top: 20px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
  }
  
  /* 响应式调整 */
  @media (max-width: 1024px) {
    .post-content {
      max-width: none;
    }
  }
</style>

{{- /* MathJax support for LaTeX formulas */ -}}
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
