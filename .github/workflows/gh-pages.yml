name: Deploy Hugo site to GitHub Pages

# 当你 push 到 main 分支时触发
on:
  push:
    branches:
      - main

# 给 Actions 推送 gh-pages 的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: 安装 Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      # Step 3: 构建 Hugo 静态站点
      - name: Build Hugo site
        run: hugo --minify --config hugo.toml

      # Step 4: 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 自动生成的 token，允许 push
          publish_dir: ./public                      # Hugo 输出目录
